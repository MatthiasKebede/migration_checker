pair:
  source: argparse
  target: docopt
libraries:
  source_roots:
  - argparse
  target_roots:
  - docopt
diagnostics:
  severity:
    leftover_source_import: error
    leftover_source_call: error
    renamed_keyword_argument: error
    forbidden_keyword_argument: error
    missing_required_keyword: error
    positional_argument_misuse: error
    missing_await: error
    missing_context_manager: error
    mixed_source_target_assignment: warning
    renamed_attribute_access: error
    forbidden_attribute_access: error
    duplicate_migration_usage: warning
rules:
- id: source-import-root
  kind: import
  source:
    module: argparse
  target:
    module: docopt
- id: parser-constructor
  kind: call
  source:
    symbol: argparse.ArgumentParser
  target:
    symbol: docopt.docopt
  contract:
    renamed_keywords: {}
    forbidden_keywords:
    - namespace
    required_keywords: []
    require_keywords: false
  usage:
    await_required: false
    context_manager: none
  return:
    tag: cli_parser
    renamed_attributes: {}
    forbidden_attributes:
    - parse_args
    - add_argument
    - namespace
    await_required_methods: []
- id: add-argument
  kind: call
  source:
    symbol: argparse.ArgumentParser.add_argument
  target:
    symbol: docopt.docopt
  contract:
    renamed_keywords: {}
    forbidden_keywords: []
    required_keywords: []
    require_keywords: false
  usage:
    await_required: false
    context_manager: none
  return:
    tag: cli_parser
    renamed_attributes: {}
    forbidden_attributes:
    - parse_args
    - add_argument
    - namespace
    await_required_methods: []
- id: parse-args
  kind: call
  source:
    symbol: argparse.ArgumentParser.parse_args
  target:
    symbol: docopt.docopt
  contract:
    renamed_keywords: {}
    forbidden_keywords:
    - namespace
    - type
    - choices
    - default
    required_keywords: []
    require_keywords: false
  usage:
    await_required: false
    context_manager: none
  return:
    tag: cli_parser
    renamed_attributes: {}
    forbidden_attributes:
    - parse_args
    - add_argument
    - namespace
    await_required_methods: []
- id: add-subparsers
  kind: call
  source:
    symbol: argparse.ArgumentParser.add_subparsers
  target:
    symbol: docopt.docopt
  contract:
    renamed_keywords: {}
    forbidden_keywords: []
    required_keywords: []
    require_keywords: false
  usage:
    await_required: false
    context_manager: none
  return:
    tag: cli_parser
    renamed_attributes: {}
    forbidden_attributes:
    - parse_args
    - add_argument
    - namespace
    await_required_methods: []
